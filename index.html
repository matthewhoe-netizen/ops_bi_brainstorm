<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI Sprint – Ops/BI Automation Ideas Board</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.snow.css" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/quill@2.0.2/dist/quill.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>

<!-- ═══════════════════════════════════════════════════════════════════════
     FIREBASE CONFIG — replace the placeholder values below with your own.
     Get these from: Firebase Console → Project Settings → Your Apps → Web
     ═══════════════════════════════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCjZ1Y6wTKjdACwU22WXwEGnfX6YRL5Pbk",
    authDomain: "ops-bi-ai-sprint-brainstorm.firebaseapp.com",
    databaseURL: "https://ops-bi-ai-sprint-brainstorm-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "ops-bi-ai-sprint-brainstorm",
    storageBucket: "ops-bi-ai-sprint-brainstorm.firebasestorage.app",
    messagingSenderId: "430275144500",
    appId: "1:430275144500:web:934a8817c65cefedbb5361"
  };

  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();
  const DB_REF = "aiSprintDB_opsbi_v1";

  // ═════════════════════════════════════════════════════════════════════════
  // ENHANCED FIREBASE LAYER with debouncing, error handling, and write verification
  // ═════════════════════════════════════════════════════════════════════════
  
  let _savePending = false;
  let _saveTimeout = null;
  let _lastSavedData = null;
  let _isSynced = true;
  
  window._fbGoogleLogin = async () => {
    try { 
      const result = await signInWithPopup(auth, provider); 
      return result.user; 
    }
    catch (e) { 
      console.error('Google Sign-In failed:', e);
      alert('Google Sign-In failed: ' + e.message); 
      return null; 
    }
  };

  // Debounced save function that prevents race conditions
  window._fbSave = async (data) => { 
    return new Promise((resolve, reject) => {
      // Clear existing timeout
      if (_saveTimeout) clearTimeout(_saveTimeout);
      
      // Set UI to "pending" state
      _isSynced = false;
      window.updateSyncStatus?.('saving');
      
      // Debounce: wait 500ms before saving (batches rapid changes)
      _saveTimeout = setTimeout(async () => {
        try {
          _savePending = true;
          
          // Serialize the data
          const serialized = JSON.parse(JSON.stringify(data));
          
          // Add metadata
          serialized._lastSaved = new Date().toISOString();
          serialized._version = 1;
          
          // Write to Firebase
          await set(ref(database, DB_REF), serialized);
          
          // Verify the write succeeded
          _lastSavedData = serialized;
          _isSynced = true;
          _savePending = false;
          
          console.log('✅ Firebase save successful', new Date().toLocaleTimeString());
          window.updateSyncStatus?.('synced');
          
          resolve();
        } catch (error) {
          _isSynced = false;
          _savePending = false;
          
          console.error('❌ Firebase save failed:', error);
          window.updateSyncStatus?.('error');
          
          // Show user-facing error
          if (window.showSaveError) {
            window.showSaveError(error.message);
          }
          
          reject(error);
        }
      }, 500);
    });
  };

  // Real-time listener (only updates DB, never overwrites with stale data)
  window._fbListen = (callback) => { 
    onValue(ref(database, DB_REF), (snapshot) => { 
      const data = snapshot.val();
      console.log('📡 Firebase data received:', new Date().toLocaleTimeString());
      
      // Only call callback if we have data
      if (data) {
        callback(data);
      }
    }, (error) => {
      console.error('❌ Firebase listener error:', error);
      window.updateSyncStatus?.('error');
    });
  };

  window._firebaseReady = true;
  window.dispatchEvent(new Event('firebaseReady'));
</script>

<style>
  :root {
    --bg:#f5f3f0; --surface:#ffffff; --surface2:#f0eee9; --border:#e5e1d8;
    --text:#1c1917; --text-2:#57534e; --text-3:#a8a29e;
    --accent:#FF5733; --emerald:#059669; --blue:#2563eb; --amber:#d97706; --red:#dc2626;
  }
  * { box-sizing:border-box; }
  body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); font-size:15px; line-height:1.6; }
  .glass { background:var(--surface); border:1px solid var(--border); box-shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04); }
  .glass-dark { background:var(--surface); border:1px solid var(--border); box-shadow:0 4px 24px rgba(0,0,0,.1); }
  .gradient-text { background:linear-gradient(135deg,#FF5733,#1A1A2E); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .idea-card { transition:all .2s; background:#fff; border-radius:8px; box-shadow:0 1px 3px rgba(0,0,0,.07); border:1px solid var(--border); }
  .idea-card:hover { box-shadow:0 4px 12px rgba(109,40,217,.1); border-color:rgba(255,87,51,.25); }
  .pill { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:999px; font-size:.72rem; font-weight:500; }
  .step-row { transition:background .15s; }
  .step-row:hover { background:#f5f3f0; }
  .drag-handle { cursor:grab; color:var(--text-3); font-size:.85rem; padding:2px 4px; border-radius:4px; flex-shrink:0; user-select:none; line-height:1; }
  .drag-handle:hover { color:var(--text-2); background:var(--surface2); }
  .drag-handle:active { cursor:grabbing; }
  .step-dragging { opacity:.35; }
  .step-drag-over { outline:2px solid var(--accent); outline-offset:-2px; }
  .btn-action { transition:all .15s; cursor:pointer; border-radius:6px; padding:4px 12px; font-size:.75rem; font-weight:500; border:1px solid #e2e8f0; background:#f1f5f9; color:#475569; }
  .btn-action:hover { background:#e2e8f0; }
  .btn-danger { background:#fee2e2; color:#dc2626; border-color:#fecaca; }
  .btn-danger:hover { background:#fecaca; }
  .btn-secondary { background:#f5f3f0; color:var(--text); border:1px solid var(--border); }
  .btn-secondary:hover { background:var(--surface2); }
  .btn-primary { background:var(--accent); color:white; border:none; }
  .btn-primary:hover { opacity:.9; }
  .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.3); display:flex; align-items:center; justify-content:center; z-index:50; }
  .modal-box { background:var(--surface); border-radius:12px; box-shadow:0 20px 25px -5px rgba(0,0,0,.15); max-width:600px; width:90%; max-height:85vh; overflow-y:auto; }
  .sync-status { position:fixed; bottom:20px; right:20px; padding:10px 16px; border-radius:8px; font-size:12px; display:flex; align-items:center; gap:8px; z-index:40; }
  .sync-status.synced { background:#d1fae5; color:#065f46; }
  .sync-status.saving { background:#fef3c7; color:#92400e; }
  .sync-status.error { background:#fee2e2; color:#991b1b; }
</style>

<body>
<div id="syncStatus" class="sync-status synced">✓ Synced</div>

<!-- Header + Navigation -->
<div class="glass-dark sticky top-0 z-20 bg-gradient-to-r from-slate-900 to-slate-800">
  <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🚀</span>
      <div>
        <h1 class="text-xl font-bold text-white">AI Sprint – Ops/BI</h1>
        <p class="text-xs text-slate-300 mt-0.5">Automation Ideas Board</p>
      </div>
    </div>
    <div class="flex items-center gap-3">
      <button id="btnSummary" onclick="openSummary()" style="padding:8px 16px;border-radius:8px;background:#4f46e5;color:white;cursor:pointer;font-size:14px;font-weight:500;border:none;">📋 My Summary</button>
      <button id="btnAdmin" onclick="openAdminSummary()" style="padding:8px 16px;border-radius:8px;background:#7c3aed;color:white;cursor:pointer;font-size:14px;font-weight:500;border:none;">👁 Admin</button>
      <button id="btnProfile" onclick="openProfile()" style="padding:8px 16px;border-radius:8px;background:var(--surface);color:var(--text);cursor:pointer;font-size:14px;font-weight:500;border:1px solid var(--border);">👤 Profile</button>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="max-w-7xl mx-auto px-6 py-6">
  <div id="mainBoard"></div>
</div>

<!-- Modals -->
<div id="ideaModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="p-6 border-b border-slate-200 flex items-center justify-between">
      <h2 class="font-bold text-lg">Add Your Idea</h2>
      <button onclick="closeIdeaModal()" class="text-2xl" style="color:var(--text-3);cursor:pointer;">✕</button>
    </div>
    <div class="p-6">
      <input type="hidden" id="ideaStepId"/>
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-2">What's your idea?</label>
        <div id="ideaEditor" style="border:1px solid var(--border);border-radius:8px;"></div>
      </div>
      <div class="grid grid-cols-2 gap-4 mb-4">
        <div>
          <label class="block text-sm font-semibold mb-2">Domain</label>
          <input type="text" id="ideaDomain" placeholder="e.g., Backend, ML, DevOps" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;"/>
        </div>
        <div>
          <label class="block text-sm font-semibold mb-2">Effort</label>
          <select id="ideaEffort" style="width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:6px;font-size:14px;">
            <option value="low">Low (1–3 days)</option>
            <option value="medium" selected>Medium (1–2 weeks)</option>
            <option value="high">High (3+ weeks)</option>
          </select>
        </div>
      </div>
      <div class="flex gap-2 justify-end">
        <button onclick="closeIdeaModal()" class="btn-secondary">Cancel</button>
        <button onclick="confirmIdeaModal()" class="btn-primary">Add Idea</button>
      </div>
    </div>
  </div>
</div>

<div id="summaryModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div id="summaryContent"></div>
  </div>
</div>

<div id="adminModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div id="adminContent"></div>
  </div>
</div>

<div id="profileModal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="p-6 border-b border-slate-200 flex items-center justify-between">
      <h2 class="font-bold text-lg">👤 Profile</h2>
      <button onclick="document.getElementById('profileModal').classList.add('hidden')" class="text-2xl" style="color:var(--text-3);cursor:pointer;">✕</button>
    </div>
    <div class="p-6">
      <div id="profileContent"></div>
    </div>
  </div>
</div>

<script>
// ═════════════════════════════════════════════════════════════════════════
// INITIALIZE FIREBASE LISTENER
// ═════════════════════════════════════════════════════════════════════════

let db = { milestones: [] };
let currentUser = null;
let _quill = null;

window.addEventListener('firebaseReady', () => {
  console.log('🔥 Firebase ready');
  window._fbListen((data) => {
    console.log('📊 Updating local db from Firebase');
    db = data || { milestones: [] };
    if (currentUser) renderAll();
  });
});

// ═════════════════════════════════════════════════════════════════════════
// SYNC STATUS INDICATOR
// ═════════════════════════════════════════════════════════════════════════

window.updateSyncStatus = (status) => {
  const statusEl = document.getElementById('syncStatus');
  if (!statusEl) return;
  
  statusEl.className = 'sync-status ' + status;
  
  const messages = {
    'synced': '✓ Synced',
    'saving': '⏳ Saving...',
    'error': '✕ Save failed'
  };
  
  statusEl.textContent = messages[status] || status;
};

window.showSaveError = (msg) => {
  alert('⚠️ Save failed: ' + msg + '\n\nYour changes are still visible locally, but may not be saved to the server.');
};

// ═════════════════════════════════════════════════════════════════════════
// UTILITIES
// ═════════════════════════════════════════════════════════════════════════

const escH = (s) => (s || '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
const uuid = () => 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) { var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8); return v.toString(16); });

// ═════════════════════════════════════════════════════════════════════════
// LOGIN & PROFILE
// ═════════════════════════════════════════════════════════════════════════

async function ensureLoggedIn() {
  if (currentUser) return true;
  currentUser = await window._fbGoogleLogin();
  if (currentUser) {
    renderAll();
    return true;
  }
  return false;
}

function openProfile() {
  if (!currentUser) return;
  const c = document.getElementById('profileContent');
  c.innerHTML = `
    <div class="mb-4">
      <p class="text-sm text-slate-500 mb-1">Logged in as</p>
      <p class="text-lg font-semibold">${escH(currentUser.displayName || 'Unknown')}</p>
      <p class="text-sm text-slate-600 font-mono">${escH(currentUser.email)}</p>
    </div>
    <button onclick="logOut()" class="btn-danger" style="width:100%;padding:10px;border-radius:6px;cursor:pointer;border:none;">Sign Out</button>
  `;
  document.getElementById('profileModal').classList.remove('hidden');
}

function logOut() {
  currentUser = null;
  db = { milestones: [] };
  document.getElementById('profileModal').classList.add('hidden');
  renderAll();
}

// ═════════════════════════════════════════════════════════════════════════
// IDEA MANAGEMENT
// ═════════════════════════════════════════════════════════════════════════

async function saveToStorage() {
  if (!currentUser) {
    alert('Please log in first');
    return;
  }
  try {
    await window._fbSave(db);
  } catch (error) {
    console.error('Save error:', error);
  }
}

function findIdea(ideaId) {
  for (const m of (db.milestones || [])) {
    for (const s of (m.steps || [])) {
      const idea = (s.ideas || []).find(i => i.id === ideaId);
      if (idea) return idea;
    }
  }
  return null;
}

function openIdeaModal(stepId) {
  document.getElementById('ideaStepId').value = stepId;
  document.getElementById('ideaDomain').value = '';
  document.getElementById('ideaEffort').value = 'medium';
  
  if (!_quill) {
    _quill = new Quill('#ideaEditor', {
      theme: 'snow',
      placeholder: 'Describe your idea...',
      modules: { toolbar: [['bold', 'italic', 'underline'], ['link']] }
    });
  }
  _quill.setContents([]);
  
  document.getElementById('ideaModal').classList.remove('hidden');
}

function closeIdeaModal() {
  document.getElementById('ideaModal').classList.add('hidden');
}

async function confirmIdeaModal() {
  if (!currentUser) { alert('Please log in'); return; }
  
  const stepId = document.getElementById('ideaStepId').value;
  const content = _quill.getContents();
  const text = _quill.getText();
  
  if (!text.trim()) { alert('Please write an idea'); return; }
  
  // Find the step
  let step = null;
  for (const m of (db.milestones || [])) {
    step = (m.steps || []).find(s => s.id === stepId);
    if (step) break;
  }
  
  if (!step) { alert('Step not found'); return; }
  
  // Create idea
  const idea = {
    id: uuid(),
    content,
    text,
    domain: document.getElementById('ideaDomain').value || 'General',
    effort: document.getElementById('ideaEffort').value,
    createdBy: { email: currentUser.email, name: currentUser.displayName || currentUser.email },
    createdAt: new Date().toISOString(),
    votes: [],
    builders: [],
    testers: []
  };
  
  if (!step.ideas) step.ideas = [];
  step.ideas.push(idea);
  
  await saveToStorage();
  closeIdeaModal();
  renderAll();
}

async function deleteIdea(ideaId) {
  if (!confirm('Delete this idea?')) return;
  for (const m of (db.milestones || [])) {
    for (const s of (m.steps || [])) {
      const i = (s.ideas || []).findIndex(x => x.id === ideaId);
      if (i > -1) {
        s.ideas.splice(i, 1);
        await saveToStorage();
        renderAll();
        return;
      }
    }
  }
}

async function toggleVote(ideaId) {
  if (!currentUser) { await ensureLoggedIn(); if (!currentUser) return; }
  
  const idea = findIdea(ideaId);
  if (!idea) return;
  
  if (!idea.votes) idea.votes = [];
  const idx = idea.votes.indexOf(currentUser.email);
  
  if (idx > -1) {
    idea.votes.splice(idx, 1);
  } else {
    idea.votes.push(currentUser.email);
  }
  
  await saveToStorage();
  renderAll();
}

async function toggleBuilder(ideaId) {
  if (!currentUser) { await ensureLoggedIn(); if (!currentUser) return; }
  
  const idea = findIdea(ideaId);
  if (!idea) return;
  
  if (!idea.builders) idea.builders = [];
  const idx = idea.builders.findIndex(b => b.email === currentUser.email);
  
  if (idx > -1) {
    idea.builders.splice(idx, 1);
  } else {
    idea.builders.push({
      email: currentUser.email,
      name: currentUser.displayName || currentUser.email,
      domain: '',
      appDetails: '',
      completed: false
    });
  }
  
  await saveToStorage();
  renderAll();
}

async function toggleTester(ideaId) {
  if (!currentUser) { await ensureLoggedIn(); if (!currentUser) return; }
  
  const idea = findIdea(ideaId);
  if (!idea) return;
  
  if (!idea.testers) idea.testers = [];
  const idx = idea.testers.findIndex(t => t.email === currentUser.email);
  
  if (idx > -1) {
    idea.testers.splice(idx, 1);
  } else {
    idea.testers.push({
      email: currentUser.email,
      name: currentUser.displayName || currentUser.email
    });
  }
  
  await saveToStorage();
  renderAll();
}

// ═════════════════════════════════════════════════════════════════════════
// MILESTONE & STEP MANAGEMENT
// ═════════════════════════════════════════════════════════════════════════

async function addMilestone() {
  if (!currentUser) { await ensureLoggedIn(); if (!currentUser) return; }
  
  const title = prompt('Milestone title:');
  if (!title) return;
  
  if (!db.milestones) db.milestones = [];
  
  db.milestones.push({
    id: uuid(),
    title,
    steps: []
  });
  
  await saveToStorage();
  renderAll();
}

async function deleteMilestone(milestoneId) {
  if (!confirm('Delete this milestone and all its steps?')) return;
  db.milestones = (db.milestones || []).filter(m => m.id !== milestoneId);
  await saveToStorage();
  renderAll();
}

async function addStep(milestoneId) {
  if (!currentUser) { await ensureLoggedIn(); if (!currentUser) return; }
  
  const milestone = (db.milestones || []).find(m => m.id === milestoneId);
  if (!milestone) return;
  
  const title = prompt('Step title:');
  if (!title) return;
  
  if (!milestone.steps) milestone.steps = [];
  
  milestone.steps.push({
    id: uuid(),
    title,
    ideas: []
  });
  
  await saveToStorage();
  renderAll();
}

async function deleteStep(milestoneId, stepId) {
  if (!confirm('Delete this step and all its ideas?')) return;
  
  const milestone = (db.milestones || []).find(m => m.id === milestoneId);
  if (milestone) {
    milestone.steps = (milestone.steps || []).filter(s => s.id !== stepId);
    await saveToStorage();
    renderAll();
  }
}

// ═════════════════════════════════════════════════════════════════════════
// RENDERING
// ═════════════════════════════════════════════════════════════════════════

function formatIdeaText(idea) {
  if (!idea) return '';
  if (idea.content && typeof idea.content === 'object' && idea.content.ops) {
    return idea.content.ops.map(op => {
      if (typeof op.insert === 'string') return escH(op.insert);
      if (op.insert?.image) return '[Image]';
      if (op.insert?.video) return '[Video]';
      return '';
    }).join('');
  }
  return escH(idea.text || '');
}

function renderAll() {
  if (!currentUser) {
    document.getElementById('mainBoard').innerHTML = `
      <div style="text-align:center;padding:60px 20px;">
        <p style="font-size:32px;margin-bottom:16px;">👋</p>
        <p style="font-size:20px;font-weight:600;margin-bottom:12px;">Welcome to the AI Sprint</p>
        <p style="color:var(--text-2);margin-bottom:24px;">Sign in to add ideas, vote, and collaborate</p>
        <button onclick="ensureLoggedIn()" class="btn-primary" style="padding:12px 24px;font-size:16px;">Sign in with Google</button>
      </div>
    `;
    return;
  }
  
  const milestonesHtml = (db.milestones || []).map(milestone => `
    <div class="glass rounded-xl p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="font-bold text-lg">${escH(milestone.title)}</h2>
        <button onclick="deleteMilestone('${milestone.id}')" class="btn-danger">Delete</button>
      </div>
      <div class="space-y-4">
        ${(milestone.steps || []).map(step => `
          <div class="border-l-4 border-slate-200 pl-4">
            <div class="flex items-center justify-between mb-3">
              <h3 class="font-semibold text-slate-700">${escH(step.title)}</h3>
              <button onclick="deleteStep('${milestone.id}','${step.id}')" class="btn-danger">Delete</button>
            </div>
            <div class="space-y-3 mb-3">
              ${(step.ideas || []).map(idea => `
                <div class="glass p-4 rounded-lg">
                  <div class="flex items-start justify-between mb-2">
                    <div style="flex:1;">
                      <div class="text-sm font-semibold text-slate-700">${formatIdeaText(idea)}</div>
                      <div class="text-xs text-slate-500 mt-1">
                        ${idea.domain ? '<span style="background:#f3f4f6;padding:2px 8px;border-radius:4px;">'+escH(idea.domain)+'</span>' : ''}
                      </div>
                    </div>
                    <button onclick="deleteIdea('${idea.id}')" class="btn-danger" style="font-size:11px;">×</button>
                  </div>
                  <div class="flex gap-2 mt-2">
                    <button onclick="toggleVote('${idea.id}')" class="btn-action">${(idea.votes || []).length} 👍</button>
                    <button onclick="toggleBuilder('${idea.id}')" class="btn-action">${(idea.builders || []).length} 🔨</button>
                    <button onclick="toggleTester('${idea.id}')" class="btn-action">${(idea.testers || []).length} 🧪</button>
                  </div>
                </div>
              `).join('')}
            </div>
            <button onclick="openIdeaModal('${step.id}')" class="btn-secondary" style="font-size:13px;padding:6px 12px;">+ Add Idea</button>
          </div>
        `).join('')}
        <button onclick="addStep('${milestone.id}')" class="btn-secondary" style="width:100%;padding:10px;">+ Add Step</button>
      </div>
    </div>
  `).join('');
  
  document.getElementById('mainBoard').innerHTML = `
    ${milestonesHtml}
    <button onclick="addMilestone()" class="btn-primary" style="width:100%;padding:12px;margin-top:12px;font-size:16px;">+ Add Milestone</button>
  `;
}

// Initial render
renderAll();
</script>

</body>
</html>
